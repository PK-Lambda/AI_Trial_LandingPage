<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Page Not Found | Placeholder</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="404.css"/>
</head>
<body>

  <nav>
    <a class="nav-logo" href="index.html">
      <div class="logo-mark">P</div>
      <span class="logo-name">Placeholder</span>
    </a>
    <button class="dark-toggle" id="darkToggle" aria-label="Toggle dark mode" title="Toggle dark mode">🌙</button>
  </nav>

  <div class="error-page">
    <div class="error-inner">
      <div class="error-code">404</div>
      <div class="error-label">Page Not Found</div>
      <h1 class="error-title">Looks like you're lost</h1>
      <p class="error-sub">The page you're looking for doesn't exist or may have been moved. Let's get you back on track.</p>
      <div class="error-actions">
        <a class="go-home" href="index.html">← Back to Home</a>
        <button class="go-back" onclick="history.back()">Go Back</button>
      </div>
    </div>
  </div>

  <div class="mini-footer">© 2026 Placeholder. All rights reserved.</div>

  <script>
    const darkToggle = document.getElementById('darkToggle');
    const html = document.documentElement;
    const savedTheme = localStorage.getItem('theme') || 'light';
    html.setAttribute('data-theme', savedTheme);
    darkToggle.textContent = savedTheme === 'dark' ? '☀️' : '🌙';
    darkToggle.addEventListener('click', () => {
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      darkToggle.textContent = next === 'dark' ? '☀️' : '🌙';
    });
  </script>

</body>
</html>
