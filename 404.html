<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Page Not Found | Placeholder</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f5f4f2;
      --surface: #ffffff;
      --border:  #e2e0dc;
      --text:    #1a1a1a;
      --muted:   #7a7774;
      --accent:  #2a2a2a;
      --tag-bg:  #eeece8;
    }
    [data-theme="dark"] {
      --bg:      #141414;
      --surface: #1e1e1e;
      --border:  #2e2e2e;
      --text:    #f0ede8;
      --muted:   #888580;
      --accent:  #e8e5e0;
      --tag-bg:  #252525;
    }
    [data-theme="dark"] nav           { background: rgba(20,20,20,0.92); }
    [data-theme="dark"] .logo-mark    { background: #e8e5e0; color: #141414; }
    [data-theme="dark"] .dark-toggle  { border-color: #2e2e2e; }
    [data-theme="dark"] .go-home      { background: #e8e5e0; color: #141414; }
    [data-theme="dark"] .go-home:hover{ background: #fff; }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Roboto', sans-serif;
      background: var(--bg); color: var(--text);
      font-size: 16px; line-height: 1.6; min-height: 100vh;
      display: flex; flex-direction: column;
      transition: background 0.3s, color 0.3s;
    }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(245,244,242,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 40px; height: 68px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--text); }
    .logo-mark {
      width: 38px; height: 38px; background: var(--accent); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 900; color: #fff;
      transition: background 0.3s, color 0.3s;
    }
    .logo-name { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
    .dark-toggle {
      background: none; border: 1.5px solid var(--border); border-radius: 8px;
      width: 36px; height: 36px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; transition: background 0.2s;
    }
    .dark-toggle:hover { background: var(--tag-bg); }

    /* 404 CONTENT */
    .error-page {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 60px 40px; text-align: center;
    }
    .error-inner { max-width: 520px; }

    .error-code {
      font-size: clamp(100px, 20vw, 160px); font-weight: 900;
      letter-spacing: -8px; line-height: 1; color: var(--tag-bg);
      margin-bottom: 0; user-select: none;
      /* Layered text effect */
      -webkit-text-stroke: 2px var(--border);
    }

    .error-label {
      display: inline-block; font-size: 11px; font-weight: 700;
      letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted);
      background: var(--tag-bg); border-radius: 20px;
      padding: 5px 14px; margin-bottom: 20px;
    }

    .error-title {
      font-size: clamp(24px, 4vw, 36px); font-weight: 800;
      letter-spacing: -1px; margin-bottom: 14px;
    }

    .error-sub {
      font-size: 15px; color: var(--muted); font-weight: 300;
      line-height: 1.7; margin-bottom: 36px;
    }

    .error-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

    .go-home {
      background: var(--accent); color: #fff; text-decoration: none;
      padding: 12px 28px; border-radius: 8px; font-size: 14px; font-weight: 600;
      transition: background 0.2s;
    }
    .go-home:hover { background: #444; }

    .go-back {
      background: none; color: var(--muted); border: 1.5px solid var(--border);
      padding: 12px 24px; border-radius: 8px; font-family: 'Roboto', sans-serif;
      font-size: 14px; font-weight: 500; cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .go-back:hover { border-color: var(--muted); color: var(--text); }

    /* FOOTER */
    .mini-footer {
      padding: 20px 40px; border-top: 1px solid var(--border);
      font-size: 12px; color: var(--muted); text-align: center;
    }

    @media (max-width: 768px) {
      nav { padding: 0 20px; }
      .error-page { padding: 40px 20px; }
      .mini-footer { padding: 20px; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="index.html">
      <div class="logo-mark">P</div>
      <span class="logo-name">Placeholder</span>
    </a>
    <button class="dark-toggle" id="darkToggle" aria-label="Toggle dark mode" title="Toggle dark mode">🌙</button>
  </nav>

  <div class="error-page">
    <div class="error-inner">
      <div class="error-code">404</div>
      <div class="error-label">Page Not Found</div>
      <h1 class="error-title">Looks like you're lost</h1>
      <p class="error-sub">The page you're looking for doesn't exist or may have been moved. Let's get you back on track.</p>
      <div class="error-actions">
        <a class="go-home" href="index.html">← Back to Home</a>
        <button class="go-back" onclick="history.back()">Go Back</button>
      </div>
    </div>
  </div>

  <div class="mini-footer">© 2026 Placeholder. All rights reserved.</div>

  <script>
    const darkToggle = document.getElementById('darkToggle');
    const html = document.documentElement;
    const savedTheme = localStorage.getItem('theme') || 'light';
    html.setAttribute('data-theme', savedTheme);
    darkToggle.textContent = savedTheme === 'dark' ? '☀️' : '🌙';
    darkToggle.addEventListener('click', () => {
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      darkToggle.textContent = next === 'dark' ? '☀️' : '🌙';
    });
  </script>

</body>
</html>
